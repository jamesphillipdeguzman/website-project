<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Join Us</title>
    <meta name="description" content="Contact page: Contact James De Guzman through mobile, phone and email">
    <meta name="author" content="James Phillip K. De Guzman">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/normalize.css">
    <link rel="icon" href="/images/project-images/favicon_io/favicon.ico" type="image/x-icon">
    <meta property="og:title" content="My Personal Website">
    <meta property="og:description"
        content="James De Guzman: An aspiring web developer who loves to create innovative web apps and websites for your local businesses!">
    <meta property="og:image" content="/images/project-images/profile.png">
    <meta property="og:url" content="https://jamesdeguzman.com/signup.html">
    <meta property="og:type" content="website">
    <meta property="og:site-name" content="https://jamesdeguzman.com/index.html">
    <script src="/js/base.js" type="module"></script>

</head>

<body>


    <div class="page-wrap">

        <header id="header-container"></header>



        <main>

            <div class="hero">
                <!-- <div class="image-container"> -->
                <h1>Be part of our growing community!</h1>
                <!-- <img src="images/site-planning.svg" alt="picture of a notebook with wireframe sketches" width="200" -->
                <!-- height="100"> -->
                <!-- </div> -->

            </div>

            <div class="bottom-section">


                <form action="thanks.html" method="dialog" class="join-form">

                    <fieldset>
                        <h3>Please subscribe to our weekly newsletter!</h3>
                        <!-- <div class="primary-info"> -->
                        <label for="firstname">
                            First Name
                            <input type="text" id="firstname" title="Enter your first name" name="firstname"
                                autocomplete="given-name">

                        </label>
                        <label for="lastname">
                            Last Name
                            <input type="text" id="lastname" title="Enter your last name" name="lastname"
                                autocomplete="family-name">

                        </label>


                        <label for="email">
                            Email
                            <input type="email" aria-required="true" required id="email" title="Enter your email"
                                name="email" autocomplete="email" placeholder="info@example.com">
                        </label>

                        <!-- <label for="mobile">
                            Mobile
                            <input type="tel" aria-required="true" required id="mobile" title="Enter your mobile"
                                name="mobile" autocomplete="tel">
    
                        </label> -->



                        <label for="questions">
                            Questions or Comments
                            <textarea name="questions" id="questions"
                                title="Enter any questions you might have"></textarea>
                        </label>

                        <label for="timestamp">
                            <input type="datetime-local" name="timestamp" id="timestamp" aria-hidden="true" hidden>
                        </label>


                        <label for="submit">
                            <input type="submit" id="submit" name="submit" value="I want to subscribe">
                        </label>



                    </fieldset>


                </form>



            </div>

        </main>
    </div>
    <div class="wireframe-overlay"></div>


    <footer id="footer-container"></footer>

</body>

</html>
